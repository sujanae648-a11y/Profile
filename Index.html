<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Muhammad Egi Sujana</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F7F5; /* Krem sangat muda */
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #7A7A7A;
            --accent-color: #B5C1B4; /* Hijau sage lembut */
            --accent-hover: #9CA89C;
            --border-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navbar */
        header {
            background-color: var(--card-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Layout Utama */
        .container {
            display: flex;
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Area Produk */
        .products {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        .product-emoji {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            background: var(--bg-color);
            padding: 20px;
            border-radius: 15px;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        /* Gaya untuk Input Jumlah Produk murni HTML */
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: auto;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 2px solid var(--bg-color);
            border-radius: 10px;
            text-align: center;
            font-family: inherit;
            outline: none;
        }

        .input-group input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        /* Area Info / Keranjang Statis */
        .cart-section {
            flex: 1;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            height: fit-content;
            position: sticky;
            top: 100px;
